name: Deploy to Staging

on:
  push:
    branches: [ develop ]

permissions:
  contents: read
  deployments: write
  statuses: write

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_ENVIRONMENT: staging

      - name: Deploy to Vercel Staging
        run: npx vercel deploy --prod --env staging
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STAGING }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

      - name: Get Staging URL
        id: staging-url
        run: |
          URL=$(npx vercel ls --env staging | grep staging | awk '{print $NF}')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Wait for deployment
        run: |
          sleep 30
          for i in {1..30}; do
            if curl -f ${{ steps.staging-url.outputs.url }} > /dev/null 2>&1; then
              echo "Deployment ready"
              exit 0
            fi
            echo "Waiting for deployment... attempt $i/30"
            sleep 10
          done
          exit 1

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          E2E_BASE_URL: ${{ steps.staging-url.outputs.url }}
          E2E_PLAYWRIGHT_ENABLED: 'true'
        continue-on-error: true

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "Staging deployment successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Staging Deployment Successful*\n<${{ steps.staging-url.outputs.url }}|View Staging>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_STAGING }}

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "Staging deployment failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Staging Deployment Failed*\nCheck <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|workflow logs>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_STAGING }}
